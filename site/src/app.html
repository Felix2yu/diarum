<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="mask-icon" href="/favicon.svg" color="#8B5A2B" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- PWA Meta Tags -->
		<meta name="theme-color" content="#F7F3E8" id="meta-theme-color" />
		<meta name="theme-color" content="#F7F3E8" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1C1714" media="(prefers-color-scheme: dark)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="吾身" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="吾身" />
		<meta name="msapplication-TileColor" content="#ffffff" />
		<meta name="description" content="一款简洁优雅、可自托管的日记应用，具备 AI 洞察能力。" />
		<script>
			// 提前根据用户主题设置 theme-color，避免 iOS/macOS PWA 启动时状态栏颜色闪烁
			(function () {
				try {
					var stored = localStorage.getItem('theme') || 'system';
					var isDark = stored === 'dark' || (stored === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					var meta = document.getElementById('meta-theme-color');
					if (meta) meta.setAttribute('content', isDark ? '#1C1714' : '#F7F3E8');
				} catch (e) { /* ignore */ }
			})();
		</script>

		%sveltekit.head%
		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-37J0W7DESF"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			gtag('config', 'G-37J0W7DESF');
		</script>
		<script>
			document.write('<script defer data-domain="diarum.frytea.com" event-domain="' + window.location.hostname + '" src="https://plausible.frytea.com/js/script.pageview-props.js"><\/script>');
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
