<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<style>
		:root { color-scheme: light dark; }
		.book-body { fill: #8B5A2B; }
		.book-cover { fill: #6B4423; }
		.book-cover-light { fill: #A97142; }
		.pages { fill: #F5E6C8; }
		.pages-dark { fill: #E8D5B0; }
		.ribbon { fill: #6B4423; }
		.spine { fill: #5A3A1E; }
		.star { fill: #FFD84D; }
		.star-edge { fill: #E8A91A; }
		@media (prefers-color-scheme: dark) {
			.book-body { fill: #6B4423; }
			.book-cover { fill: #4A2F18; }
			.book-cover-light { fill: #8B5A2B; }
			.pages { fill: #D4B896; }
			.pages-dark { fill: #B89B74; }
			.ribbon { fill: #4A2F18; }
			.spine { fill: #3A2410; }
			.star { fill: #FFE066; }
			.star-edge { fill: #E8B82A; }
		}
	</style>
	<!-- Book body -->
	<rect class="book-body" x="8" y="6" width="48" height="52" rx="4"/>
	<!-- Spine -->
	<rect class="spine" x="10" y="6" width="6" height="52"/>
	<!-- Cover highlight -->
	<rect class="book-cover-light" x="18" y="8" width="4" height="48" rx="2"/>
	<!-- Pages -->
	<rect class="pages" x="22" y="10" width="32" height="44" rx="2"/>
	<rect class="pages-dark" x="22" y="10" width="32" height="4" rx="2"/>
	<!-- Star -->
	<path class="star-edge" d="M32 18l3.6 7.3 8.1 1.2-5.9 5.7 1.4 8-7.2-3.8-7.2 3.8 1.4-8-5.9-5.7 8.1-1.2z"/>
	<path class="star" d="M32 20l3 6.1 6.6 1-4.8 4.6 1.2 6.3-6-3.2-6 3.2 1.2-6.3-4.8-4.6 6.6-1z"/>
	<!-- Ribbon -->
	<polygon class="ribbon" points="36,40 36,58 40,54 44,58 44,40"/>
</svg>
