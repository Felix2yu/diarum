root = "."
tmp_dir = ".tmp"

[build]
cmd = "go build -o .tmp/diarum-dev ."
bin = ".tmp/diarum-dev"
full_bin = "LOG_LEVEL=DEBUG ./.tmp/diarum-dev serve"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = [".tmp", "diarum_data", "dist", "docs", "internal/static/build", "site/.svelte-kit", "site/build", "site/node_modules", "vendor"]
exclude_regex = ["_test.go"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true